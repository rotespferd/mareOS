# mareOS — curated, digest-pinned dev environments.
# Assemble with:  distrobox assemble create --file /usr/share/mareos/distrobox.ini
#
# Images are pinned by @sha256 digest (NOT tags) so a compromised upstream tag
# cannot silently change what you run. Renovate keeps these digests fresh with a
# cooldown. Replace the placeholder digests below with current ones, e.g.:
#   skopeo inspect docker://quay.io/toolbx/ubuntu-toolbox:24.04 --format '{{.Digest}}'

[dev-node]
# Node/TypeScript work. npm/pnpm live here, never on the host.
image=ghcr.io/ublue-os/ubuntu-toolbox@sha256:REPLACE_WITH_DIGEST
additional_packages="git"
init_hooks="cp -n /etc/skel/.npmrc ~/.npmrc || true"

[dev-python]
# Python work. pip/uv/poetry live here, never on the host.
image=ghcr.io/ublue-os/fedora-toolbox@sha256:REPLACE_WITH_DIGEST
additional_packages="git python3-pip"

[dev-jvm]
# JVM/Maven/Gradle work.
image=quay.io/toolbx/ubuntu-toolbox@sha256:REPLACE_WITH_DIGEST
additional_packages="git"
