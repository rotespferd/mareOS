# mareOS hardened pip defaults (seeded via /etc/skel)
# Lowest-trust tier — see https://crftd.tech/blog/2026-05-30-notes-on-safer-development/
# Reminder: run pip INSIDE a container/venv, never against the host interpreter.

[global]
# Require hashes in requirements files so every artifact is pinned by digest.
require-hashes = false        ; flip to true in projects that ship hashed lockfiles
# Don't silently reach across the network for build isolation surprises.
disable-pip-version-check = true
# Fail instead of falling back to a less safe source.
no-input = true

[install]
# Prefer wheels (no arbitrary setup.py execution) where possible.
prefer-binary = true
